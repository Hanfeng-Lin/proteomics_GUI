# Conda environment for the DIA-NN Volcano Explorer GUI.
# Built from the working env 'proteomics' via: conda env export --no-builds
# Recreate with:  conda env create -f environment.yml   (then: conda activate proteomics)
# Note: the 'Use limma' option also needs R + R_HOME + the Bioconductor 'limma' package.
